<!DOCTYPE html>
<html>
<head>
    <title>Route Tracker with Real GPS</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <style>
        body { margin: 0; font-family: Arial; }
        #controls { padding: 10px; background: #f0f0f0; }
        #map { height: 80vh; }
        #info { padding: 10px; background: #eee; font-family: monospace; }
        input { width: 120px; margin-right: 10px; }
    </style>
</head>
<body>

<div id="controls">
    Start Time (HH:MM:SS): <input type="text" id="startTime" placeholder="17:00:00">
    End Time (HH:MM:SS): <input type="text" id="endTime" placeholder="18:00:00">
    Duration (seconds or HH:MM:SS): <input type="text" id="duration" placeholder="3600">
    <label><input type="checkbox" id="pauseUpdates"> Pause updates</label>
    <button onclick="startTracking()">Start Tracking</button>
</div>

<div id="map"></div>
<div id="info">GPS info will appear here...</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
const map = L.map('map').setView([42.02, -76.21], 13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

let points = [];
let routeLine = null;
let redMarker = null;
let greenMarker = null;
let intervalId = null;

let lastGPS = null;
let currentSpeedMph = 0;
let totalRouteDistance = 0;
const speedSamples = [];
const SMOOTH_WINDOW_MS = 5000;

const infoDiv = document.getElementById('info');
const pauseCheckbox = document.getElementById('pauseUpdates');

// Convert HH:MM:SS or seconds to seconds
function timeToSeconds(t) {
    if (!t) return null;
    const parts = t.split(':').map(Number);
    if (parts.length === 1) return Number(parts[0]);
    return parts[0]*3600 + parts[1]*60 + (parts[2] || 0);
}

// Convert seconds to HH:MM:SS
function secondsToTime(sec) {
    const h = Math.floor(sec / 3600);
    const m = Math.floor((sec % 3600) / 60);
    const s = Math.floor(sec % 60);
    return `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
}

// Linear interpolation
function interpolatePoint(p1, p2, alpha) {
    const lat = p1.lat + (p2.lat - p1.lat) * alpha;
    const lon = p1.lon + (p2.lon - p1.lon) * alpha;
    return [lat, lon];
}

function getCurrentPercent(startSec, endSec) {
    const now = new Date();
    const curSec = now.getHours()*3600 + now.getMinutes()*60 + now.getSeconds();

    if (curSec <= startSec) return 0;
    if (curSec >= endSec) return 100;

    return ((curSec - startSec) / (endSec - startSec)) * 100;
}

// Haversine distance in miles
function distanceMi(lat1, lon1, lat2, lon2) {
    const R = 3958.8;
    const toRad = Math.PI/180;
    const dLat = (lat2-lat1)*toRad;
    const dLon = (lon2-lon1)*toRad;
    const a = Math.sin(dLat/2)**2 + Math.cos(lat1*toRad)*Math.cos(lat2*toRad)*Math.sin(dLon/2)**2;
    const c = 2*Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    return R*c;
}

function getRouteSegmentAtPercent(percent) {
    let p1 = points[0], p2 = points[points.length-1];
    for (let i = 1; i < points.length; i++) {
        if (points[i].percent >= percent) {
            p1 = points[i-1];
            p2 = points[i];
            break;
        }
    }
    const alpha = (percent - p1.percent) / (p2.percent - p1.percent || 1);
    return { p1, p2, alpha };
}

function getSegmentTargetSpeed(percent, totalDurationHours) {
    if (points.length < 2 || totalDurationHours <= 0) return 0;
    const { p1, p2 } = getRouteSegmentAtPercent(percent);
    const segmentMiles = distanceMi(p1.lat, p1.lon, p2.lat, p2.lon);
    const segmentPercent = Math.abs(p2.percent - p1.percent) / 100;
    const segmentHours = segmentPercent * totalDurationHours;
    if (segmentHours <= 0) return totalRouteDistance / totalDurationHours;
    return segmentMiles / segmentHours;
}

function smoothSpeedSample(speed, nowTime) {
    speedSamples.push({ time: nowTime, speed });
    const cutoff = nowTime - SMOOTH_WINDOW_MS;
    while (speedSamples.length && speedSamples[0].time < cutoff) {
        speedSamples.shift();
    }
    if (!speedSamples.length) return 0;
    const total = speedSamples.reduce((sum, sample) => sum + sample.speed, 0);
    return total / speedSamples.length;
}

function formatSpan(text, color) {
    return `<span style="color:${color};">${text}</span>`;
}

function formatTimeColor(expectedSec, currentSec, content) {
    return formatSpan(content, expectedSec > currentSec ? 'green' : 'red');
}

function updateRedDot(startSec, endSec) {
    if (pauseCheckbox.checked) return;
    const now = new Date();
    const curSec = now.getHours()*3600 + now.getMinutes()*60 + now.getSeconds();
    if (curSec < startSec || curSec > endSec) {
        if (redMarker) map.removeLayer(redMarker);
        return;
    }

    const totalDuration = endSec - startSec;
    let percent = ((curSec - startSec)/totalDuration)*100;
    percent = Math.max(0, Math.min(100, percent));

    let p1 = points[0], p2 = points[points.length-1];
    for (let i=1; i<points.length; i++) {
        if (points[i].percent >= percent) {
            p1 = points[i-1]; p2 = points[i];
            break;
        }
    }

    const alpha = (percent - p1.percent)/(p2.percent - p1.percent || 1);
    const pos = interpolatePoint(p1, p2, alpha);

    if (redMarker) map.removeLayer(redMarker);
    redMarker = L.circleMarker(pos, {radius:8, color:'red'}).addTo(map);
}

function getDistanceAtPercent(percent) {
    let p1 = points[0], p2 = points[points.length-1];

    for (let i=1; i<points.length; i++) {
        if (points[i].percent >= percent) {
            p1 = points[i-1];
            p2 = points[i];
            break;
        }
    }

    const alpha = (percent - p1.percent) / (p2.percent - p1.percent || 1);
    return p1.cumDist + alpha * (p2.cumDist - p1.cumDist);
}

function snapToRoute(lat, lon, redPercent) {
    let best = null;
    let bestScore = Infinity;
    const EPS = 0.00001;

    for (let i = 0; i < points.length - 1; i++) {
        const p1 = points[i];
        const p2 = points[i + 1];

        const alpha = projectPointOnSegment(lat, lon, p1, p2);

        const projLat = p1.lat + alpha * (p2.lat - p1.lat);
        const projLon = p1.lon + alpha * (p2.lon - p1.lon);

        const d = distanceMi(lat, lon, projLat, projLon);
        const percent = p1.percent + alpha * (p2.percent - p1.percent);

        let score = d;

        if (best &&
            Math.abs(projLat - best.lat) < EPS &&
            Math.abs(projLon - best.lon) < EPS) {

            const percentDiff = Math.abs(percent - redPercent);
            const bestPercentDiff = Math.abs(best.percent - redPercent);

            if (percentDiff < bestPercentDiff) {
                best = { lat: projLat, lon: projLon, percent };
            }
            continue;
        }

        if (score < bestScore) {
            bestScore = score;
            best = { lat: projLat, lon: projLon, percent };
        }
    }

    return best;
}

function projectPointOnSegment(lat, lon, p1, p2) {
    const dx = p2.lon - p1.lon;
    const dy = p2.lat - p1.lat;

    if (dx === 0 && dy === 0) return 0;

    const t = ((lon - p1.lon) * dx + (lat - p1.lat) * dy) / (dx * dx + dy * dy);
    return Math.max(0, Math.min(1, t));
}

function updateGPS(lat, lon, startSec, endSec) {
    if (pauseCheckbox.checked) return;
    if (points.length < 2) return;

    const redPercent = getCurrentPercent(startSec, endSec);
    const nearest = snapToRoute(lat, lon, redPercent);

    const nlat = nearest.lat;
    const nlon = nearest.lon;

    if (greenMarker) map.removeLayer(greenMarker);
    greenMarker = L.circleMarker([nlat, nlon], {radius:8, color:'green'}).addTo(map);

    const nowTime = Date.now();
    const dtMs = lastGPS ? nowTime - lastGPS.time : 0;

    if (lastGPS && dtMs > 0 && dtMs <= SMOOTH_WINDOW_MS * 2) {
        const dtHours = dtMs / 3600000;
        const d = distanceMi(lastGPS.lat, lastGPS.lon, lat, lon);
        const instantSpeed = d / dtHours;
        currentSpeedMph = smoothSpeedSample(instantSpeed, nowTime);
    } else if (!lastGPS) {
        currentSpeedMph = 0;
    } else if (lastGPS && dtMs > SMOOTH_WINDOW_MS * 2) {
        speedSamples.length = 0;
        currentSpeedMph = 0;
    }

    lastGPS = { lat, lon, time: nowTime };

    const percent = nearest.percent;
    const expectedTimeSec = startSec + (percent / 100) * (endSec - startSec);

    const now = new Date();
    const currentSec = now.getHours()*3600 + now.getMinutes()*60 + now.getSeconds();
    const timeDiff = currentSec - expectedTimeSec;

    const userDist = getDistanceAtPercent(percent);
    const targetDist = getDistanceAtPercent(redPercent);
    const milesDiff = userDist - targetDist;

    const totalHours = (endSec - startSec) / 3600;
    const targetSpeed = getSegmentTargetSpeed(redPercent, totalHours);

    const remainingMiles = Math.max(0, totalRouteDistance - userDist);
    const estimatedFinishSec = currentSpeedMph > 0
        ? currentSec + (remainingMiles / currentSpeedMph) * 3600
        : null;
    const estimatedFinish = estimatedFinishSec !== null ? secondsToTime(estimatedFinishSec) : 'N/A';

    const expectedTimeText = formatTimeColor(expectedTimeSec, currentSec, secondsToTime(expectedTimeSec));
    const timeColor = timeDiff < 0 ? 'green' : 'red';
    const milesColor = milesDiff >= 0 ? 'green' : 'red';
    const speedColor = currentSpeedMph > targetSpeed ? 'green' : 'red';

    infoDiv.innerHTML = `
Expected Time: ${expectedTimeText} (${estimatedFinish})<br>
Time behind: ${formatSpan(`${timeDiff.toFixed(1)} s`, timeColor)}<br>
Miles ahead: ${formatSpan(`${milesDiff.toFixed(3)} mi`, milesColor)} (${userDist.toFixed(3)}/${totalRouteDistance.toFixed(3)})<br>
Current Speed: ${formatSpan(`${currentSpeedMph.toFixed(2)} mph`, speedColor)}<br>
Target Speed: ${formatSpan(`${targetSpeed.toFixed(2)} mph`, 'black')}
`;
}

function startTracking() {
    if (intervalId) clearInterval(intervalId);

    let startInput = document.getElementById('startTime').value.trim();
    let endInput = document.getElementById('endTime').value.trim();
    let durationInput = document.getElementById('duration').value.trim();

    let startSec = startInput ? timeToSeconds(startInput) : null;
    let endSec = endInput ? timeToSeconds(endInput) : null;
    let durationSec = durationInput ? timeToSeconds(durationInput) : null;

    if (startSec != null && endSec != null && durationSec == null) {
        durationSec = endSec - startSec;
        document.getElementById('duration').value = durationSec;
    } else if (startSec != null && durationSec != null && endSec == null) {
        endSec = startSec + durationSec;
        document.getElementById('endTime').value = secondsToTime(endSec);
    } else if (endSec != null && durationSec != null && startSec == null) {
        startSec = endSec - durationSec;
        document.getElementById('startTime').value = secondsToTime(startSec);
    } else if ((startSec == null && endSec == null) || 
               (startSec == null && durationSec == null) || 
               (endSec == null && durationSec == null)) {
        alert("Enter any two of Start Time, End Time, Duration");
        return;
    }

    intervalId = setInterval(() => {
        updateRedDot(startSec, endSec);
    }, 1000);

    if (navigator.geolocation) {
        navigator.geolocation.watchPosition(
            pos => {
                const lat = pos.coords.latitude;
                const lon = pos.coords.longitude;
                updateGPS(lat, lon, startSec, endSec);
            },
            err => console.error("GPS error:", err),
            { enableHighAccuracy: true, maximumAge: 1000 }
        );
    } else {
        alert("Geolocation not supported by your browser.");
    }
}

    for (let i=1;i<lines.length;i++){
        const parts = lines[i].split(',');
        if(parts.length<3) continue;
        const lon=parseFloat(parts[0]), lat=parseFloat(parts[1]), percent=parseFloat(parts[2]);

        points.push({lat,lon,percent});

    totalRouteDistance = 0;
    if (points.length > 0) {
        points[0].cumDist = 0;
        for (let i = 1; i < points.length; i++) {
            const d = distanceMi(
                points[i-1].lat, points[i-1].lon,
                points[i].lat, points[i].lon
            );
            totalRouteDistance += d;
            points[i].cumDist = totalRouteDistance;
